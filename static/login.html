<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miuturn Admin - Login | miuda.ai </title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-gray-800 rounded-lg p-8 w-96 border border-gray-700">
        <h1 class="text-2xl font-bold text-blue-400 mb-6">miuturn Admin</h1>
        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Username</label>
                <input type="text" name="username" required
                    class="w-full bg-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Password</label>
                <input type="password" name="password" required
                    class="w-full bg-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div id="error" class="bg-red-900/50 border border-red-500 text-red-200 text-sm rounded p-2 hidden flex items-center">
                <svg class="w-4 h-4 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                </svg>
                <span>Invalid username or password</span>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 rounded px-4 py-2 font-semibold">
                Login
            </button>
        </form>
        <div class="mt-6 text-center text-sm text-gray-500">
            Powered by <a href="https://miuda.ai" target="_blank" class="text-blue-400 hover:text-blue-300">miuda.ai</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('error')) {
            document.getElementById('error').classList.remove('hidden');
        }
    </script>
</body>

</html>
